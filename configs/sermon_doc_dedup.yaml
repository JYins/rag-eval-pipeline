dataset:
  name: sermon
  sermon_dir: data/raw/sermons
  questions_path: data/eval/sermon_questions.csv
  limit: 50

output:
  metrics_path: results/sermon_doc_dedup_metrics.csv
  per_query_path: results/sermon_doc_dedup_per_query.json

experiments:
  - name: bm25_sentence_top3_sermon_dedup
    retrieval_mode: bm25
    dedupe_docs: true
    top_k: 3
    chunking:
      strategy: sentence
      max_sentences: 2

  - name: dense_sentence_top3_sermon_multilingual_dedup
    retrieval_mode: dense
    model_name: paraphrase-multilingual-MiniLM-L12-v2
    dedupe_docs: true
    top_k: 3
    chunking:
      strategy: sentence
      max_sentences: 2

  - name: hybrid_sentence_top3_sermon_multilingual_dedup
    retrieval_mode: hybrid
    model_name: paraphrase-multilingual-MiniLM-L12-v2
    dedupe_docs: true
    top_k: 3
    bm25_weight: 0.5
    dense_weight: 0.5
    chunking:
      strategy: sentence
      max_sentences: 2
