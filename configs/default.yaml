dataset:
  name: hotpotqa
  path: data/eval/hotpotqa_subset.json
  limit: 15

output:
  metrics_path: results/metrics_summary.csv
  per_query_path: results/per_query_results.json

experiments:
  - name: bm25_sentence_top3
    retrieval_mode: bm25
    top_k: 3
    chunking:
      strategy: sentence
      max_sentences: 2

  - name: dense_sentence_top3_minilm
    retrieval_mode: dense
    model_name: all-MiniLM-L6-v2
    top_k: 3
    chunking:
      strategy: sentence
      max_sentences: 2

  - name: hybrid_sentence_top3_minilm
    retrieval_mode: hybrid
    model_name: all-MiniLM-L6-v2
    top_k: 3
    bm25_weight: 0.5
    dense_weight: 0.5
    chunking:
      strategy: sentence
      max_sentences: 2
