dataset:
  name: sermon
  sermon_dir: data/raw/sermons
  questions_path: data/eval/sermon_questions.csv
  limit: 50

output:
  metrics_path: results/sermon_metrics_summary.csv
  per_query_path: results/sermon_per_query_results.json

experiments:
  - name: bm25_sentence_top3_sermon
    retrieval_mode: bm25
    top_k: 3
    chunking:
      strategy: sentence
      max_sentences: 2
