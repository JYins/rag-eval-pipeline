dataset:
  name: sermon
  sermon_dir: data/raw/sermons
  questions_path: data/eval/sermon_questions.csv
  limit: 21

output:
  metrics_path: results/sermon_chromadb_ragas_metrics.csv
  per_query_path: results/sermon_chromadb_ragas_per_query.json

experiments:
  - name: dense_sentence_top3_sermon_chromadb_ragas
    retrieval_mode: dense
    model_name: paraphrase-multilingual-MiniLM-L12-v2
    dense_backend: chromadb
    top_k: 3
    answer_quality:
      use_ragas: true
    chunking:
      strategy: sentence
      max_sentences: 2
