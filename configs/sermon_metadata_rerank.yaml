dataset:
  name: sermon
  sermon_dir: data/raw/sermons
  questions_path: data/eval/sermon_questions.csv
  limit: 50

output:
  metrics_path: results/sermon_metadata_rerank_metrics.csv
  per_query_path: results/sermon_metadata_rerank_per_query.json

experiments:
  - name: dense_sentence_top3_sermon_multilingual_title_aware_base
    retrieval_mode: dense
    model_name: paraphrase-multilingual-MiniLM-L12-v2
    top_k: 3
    chunking:
      strategy: sentence
      max_sentences: 2
      include_title: true

  - name: dense_sentence_top3_sermon_multilingual_metadata_rerank
    retrieval_mode: dense
    model_name: paraphrase-multilingual-MiniLM-L12-v2
    top_k: 3
    metadata_rerank:
      title_hint_boost: 6.0
      opening_chunk_boost: 8.0
      opening_chunk_window: 3
    chunking:
      strategy: sentence
      max_sentences: 2
      include_title: true
