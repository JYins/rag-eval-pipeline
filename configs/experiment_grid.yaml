dataset:
  name: hotpotqa
  path: data/eval/hotpotqa_subset.json
  limit: 500

output:
  metrics_path: results/metrics_summary.csv
  per_query_path: results/per_query_results.json

experiments:
  - name: bm25_fixed_top3
    retrieval_mode: bm25
    top_k: 3
    chunking:
      strategy: fixed
      chunk_size: 120
      overlap: 20

  - name: bm25_sentence_top3
    retrieval_mode: bm25
    top_k: 3
    chunking:
      strategy: sentence
      max_sentences: 2

  - name: bm25_paragraph_top3
    retrieval_mode: bm25
    top_k: 3
    chunking:
      strategy: paragraph

base_experiment:
  top_k: 3
  chunking:
    strategy: sentence
    max_sentences: 2

grid:
  chunk_strategy:
    - fixed
    - sentence
    - paragraph
  retrieval_mode:
    - dense
    - hybrid
  model_name:
    - all-MiniLM-L6-v2
    - multi-qa-MiniLM-L6-cos-v1
